name: UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        run: npx playwright test --project=ui
        env:
          KAIJU_BASE_URL: ${{ secrets.KAIJU_BASE_URL }}
          KAIJU_EMAIL: ${{ secrets.KAIJU_EMAIL }}
          KAIJU_PASSWORD: ${{ secrets.KAIJU_PASSWORD }}
          KAIJU_TOTP_SECRET: ${{ secrets.KAIJU_TOTP_SECRET }}
          HEADLESS: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
